<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Земельный Штурман</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app">

    <!-- Шапка -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🗺️</span>
        <div>
          <h1>Земельный Штурман</h1>
          <p>AI-навигатор по получению земли от государства</p>
        </div>
      </div>
      <div class="progress-wrap" id="progress-wrap" style="display:none">
        <span id="progress-label">Вопрос 1 из 5</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </header>

    <!-- Чат -->
    <main class="chat" id="chat"></main>

    <!-- Поле ввода / кнопки -->
    <footer class="input-area" id="input-area"></footer>

  </div>

  <script src="js/strategies.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
